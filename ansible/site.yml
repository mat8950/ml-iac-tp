---
# Secrets dans l'inventaire (host_vars vault-chiffrés par Terraform)
# Lancer avec : ansible-playbook site.yml --vault-password-file .vault_pass

# ── Serveur DB (PostgreSQL) ───────────────────────────────────────────────────
- name: Configure DB server
  hosts: dbservers
  become: true
  roles:
    - common
    - postgresql

# ── Serveurs WordPress (Nginx + PHP + WP) ─────────────────────────────────────
- name: Configure WordPress servers
  hosts: webservers
  become: true
  roles:
    - common
    - nginx
    - php
    - wordpress
