---
- name: Install PostgreSQL server and Python driver
  dnf:
    name:
      - postgresql15-server
      - postgresql15
      - python3-psycopg2
    state: present

- name: Initialize PostgreSQL data directory
  command: postgresql-setup --initdb
  args:
    creates: /var/lib/pgsql/data/PG_VERSION

- name: Allow PostgreSQL to listen on all interfaces
  lineinfile:
    path: /var/lib/pgsql/data/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart postgresql

- name: Allow each WordPress server to connect (pg_hba.conf)
  lineinfile:
    path: /var/lib/pgsql/data/pg_hba.conf
    line: "host    {{ hostvars[item]['wp_db_name'] }}    {{ hostvars[item]['wp_db_user'] }}    10.0.0.0/24    md5"
    insertbefore: "^host"
  loop: "{{ groups['webservers'] }}"
  notify: Restart postgresql

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: true
    state: started

- name: Create WordPress database per site
  postgresql_db:
    name: "{{ hostvars[item]['wp_db_name'] }}"
    state: present
  become_user: postgres
  loop: "{{ groups['webservers'] }}"

- name: Create WordPress database user per site
  postgresql_user:
    name: "{{ hostvars[item]['wp_db_user'] }}"
    password: "{{ hostvars[item]['wp_db_password'] }}"
    state: present
  become_user: postgres
  loop: "{{ groups['webservers'] }}"
  no_log: true

- name: Grant all privileges on database per site
  postgresql_privs:
    db: "{{ hostvars[item]['wp_db_name'] }}"
    role: "{{ hostvars[item]['wp_db_user'] }}"
    type: database
    privs: ALL
    state: present
  become_user: postgres
  loop: "{{ groups['webservers'] }}"

- name: Grant all privileges on public schema per site (PostgreSQL 15+)
  postgresql_privs:
    db: "{{ hostvars[item]['wp_db_name'] }}"
    role: "{{ hostvars[item]['wp_db_user'] }}"
    type: schema
    objs: public
    privs: ALL
    state: present
  become_user: postgres
  loop: "{{ groups['webservers'] }}"
