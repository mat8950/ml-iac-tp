---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Create WordPress document root
  file:
    path: "{{ wordpress_root }}"
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"

- name: Deploy WordPress vhost config
  template:
    src: wordpress.conf.j2
    dest: /etc/nginx/conf.d/wordpress.conf
    mode: "0644"
  notify: Restart nginx

- name: Remove default nginx config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Restart nginx

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: true
    state: started
