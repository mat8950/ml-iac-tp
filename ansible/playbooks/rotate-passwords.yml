---
# Rotation des mots de passe d'un site WordPress
# Appelé par scripts/rotate-passwords.sh — ne pas lancer directement
#
# Variables requises (injectées par le script) :
#   site_key          : identifiant du site (ex: site1)
#   new_db_password   : nouveau mot de passe PostgreSQL
#   new_admin_password: nouveau mot de passe admin WordPress

- name: Validate required variables
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check required variables
      assert:
        that:
          - site_key is defined
          - new_db_password is defined
          - new_admin_password is defined
        fail_msg: "Utilisez scripts/rotate-passwords.sh plutôt que ce playbook directement"

# ── Mise à jour côté DB ───────────────────────────────────────────────────────
- name: Rotate DB password
  hosts: dbservers
  become: true

  tasks:
    - name: Update PostgreSQL user password
      postgresql_user:
        name: "wp_{{ site_key }}"
        password: "{{ new_db_password }}"
        state: present
      become_user: postgres
      no_log: true

# ── Mise à jour côté WordPress ────────────────────────────────────────────────
- name: Rotate WordPress admin password and update wp-config.php
  hosts: "{{ site_key }}"
  become: true

  tasks:
    - name: Update wp-config.php with new DB password
      lineinfile:
        path: "{{ wordpress_root }}/wp-config.php"
        regexp: "^define\\( 'DB_PASSWORD'"
        line: "define( 'DB_PASSWORD', '{{ new_db_password }}' );"
      no_log: true

    - name: Update WordPress admin password via WP-CLI
      command: >
        wp user update {{ wp_admin_user }}
        --user_pass="{{ new_admin_password }}"
        --path="{{ wordpress_root }}"
        --allow-root
      no_log: true
      changed_when: false
