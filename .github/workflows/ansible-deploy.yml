name: Ansible Deploy

on:
  workflow_run:
    workflows: ["Terraform Apply"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    eu-west-1

jobs:
  # ── Récupération des outputs Terraform ───────────────────────────────────────
  terraform-outputs:
    name: Get Terraform Outputs
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      wp_ip: ${{ steps.tf.outputs.wp_ip }}
      db_ip: ${{ steps.tf.outputs.db_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ml-iac-tp/terraform.tfstate" \
            -backend-config="region=eu-west-1" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Get Terraform outputs
        id: tf
        run: |
          echo "wp_ip=$(terraform output -raw wordpress_public_ip)" >> $GITHUB_OUTPUT
          echo "db_ip=$(terraform output -raw db_private_ip)"       >> $GITHUB_OUTPUT

  # ── Déploiement Ansible ───────────────────────────────────────────────────────
  deploy:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: terraform-outputs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write vault password
        run: echo "$VAULT_PASS" > ansible/.vault_pass && chmod 600 ansible/.vault_pass
        env:
          VAULT_PASS: ${{ secrets.VAULT_PASS }}

      - name: Fetch SSH keys from Secrets Manager
        run: |
          mkdir -p ansible/keys
          aws secretsmanager get-secret-value \
            --region eu-west-1 \
            --secret-id mathis/ssh/wordpress \
            --query SecretString --output text > ansible/keys/wordpress.pem
          aws secretsmanager get-secret-value \
            --region eu-west-1 \
            --secret-id mathis/ssh/db \
            --query SecretString --output text > ansible/keys/db.pem
          chmod 600 ansible/keys/wordpress.pem ansible/keys/db.pem

      - name: Generate host_vars
        run: |
          mkdir -p ansible/host_vars
          cat > ansible/host_vars/wp_host.yml << EOF
          ansible_host: ${{ needs.terraform-outputs.outputs.wp_ip }}
          ansible_ssh_private_key_file: keys/wordpress.pem
          EOF
          cat > ansible/host_vars/db_host.yml << EOF
          ansible_host: ${{ needs.terraform-outputs.outputs.db_ip }}
          ansible_ssh_private_key_file: keys/db.pem
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump='ec2-user@${{ needs.terraform-outputs.outputs.wp_ip }}'"
          EOF

      - name: Install Ansible
        run: pip install ansible boto3

      - name: Run Ansible playbook
        working-directory: ansible
        run: ansible-playbook site.yml
